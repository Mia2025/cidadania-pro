<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Cidadania USA Pro — App de Estudo</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --navy:#003366;--navy2:#004080;--navy-lt:#EBF2FA;
  --orange:#FF6600;--orange2:#E05500;--orange-lt:#FFF3EB;
  --green:#1E5631;--green-lt:#EAF4ED;
  --red:#CC0000;--red-lt:#FFF0F0;
  --off:#F8F7F4;--white:#FFFFFF;
  --ink:#2D2D2D;--ink2:#4A4A4A;--muted:#787878;
  --border:rgba(0,51,102,.10);
  --r:10px;--rl:18px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--off);color:var(--ink);line-height:1.65;overflow-x:hidden;min-height:100vh}
a{text-decoration:none;color:inherit}
button{font-family:'Plus Jakarta Sans',sans-serif;cursor:pointer}

@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
@keyframes popIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,102,0,.35)}70%{box-shadow:0 0 0 10px rgba(255,102,0,0)}}
@keyframes confettiDrop{0%{opacity:1;transform:translateY(0) rotate(0deg)}100%{opacity:0;transform:translateY(100px) rotate(720deg)}}

/* NAV */
.nav{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:var(--white);position:sticky;top:0;z-index:100;border-bottom:2px solid var(--navy);box-shadow:0 2px 12px rgba(0,0,0,.05)}
.logo{font-size:17px;font-weight:800;color:var(--navy);letter-spacing:-.03em}
.logo span{color:var(--orange)}
.nav-right{display:flex;align-items:center;gap:10px}
.nav-sel{padding:7px 10px;border-radius:var(--r);border:1.5px solid var(--border);font-size:11.5px;font-weight:600;font-family:'Plus Jakarta Sans',sans-serif;color:var(--navy);background:var(--navy-lt);cursor:pointer;outline:none}
.nav-btn{padding:7px 14px;border-radius:var(--r);border:none;font-size:11.5px;font-weight:700;background:var(--navy-lt);color:var(--navy);transition:all .2s}
.nav-btn:hover{background:var(--navy);color:var(--white)}
.nav-btn.danger{background:var(--red-lt);color:var(--red)}
.nav-btn.danger:hover{background:var(--red);color:var(--white)}

/* TABS */
.tabs{display:flex;background:var(--white);border-bottom:1px solid var(--border);padding:0 16px;gap:0;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:13px 18px;font-size:12.5px;font-weight:700;color:var(--muted);border:none;background:none;border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap}
.tab:hover{color:var(--navy)}
.tab.active{color:var(--navy);border-bottom-color:var(--orange)}

/* SCREENS */
.screen{display:none;animation:fadeUp .4s ease}
.screen.active{display:block}

/* AUTH SCREEN */
.auth-wrap{min-height:calc(100vh - 60px);display:flex;align-items:center;justify-content:center;padding:24px}
.auth-box{background:var(--white);border-radius:var(--rl);padding:40px;max-width:420px;width:100%;border:1px solid var(--border);box-shadow:0 8px 32px rgba(0,0,0,.06);animation:popIn .4s ease}
.auth-box h2{font-size:24px;font-weight:800;color:var(--navy);margin-bottom:4px;text-align:center}
.auth-box .sub{font-size:13.5px;color:var(--muted);text-align:center;margin-bottom:24px}
.fg{margin-bottom:14px}
.fl{font-size:11px;font-weight:800;color:var(--ink2);margin-bottom:5px;display:block;letter-spacing:.04em;text-transform:uppercase}
.fi{width:100%;padding:12px 14px;border-radius:var(--r);border:1.5px solid rgba(0,0,0,.12);font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;color:var(--ink);background:var(--white);outline:none;transition:border-color .2s,box-shadow .2s}
.fi:focus{border-color:var(--navy);box-shadow:0 0 0 3px rgba(0,51,102,.08)}
.fi.error{border-color:var(--red);box-shadow:0 0 0 3px rgba(204,0,0,.08)}
.err-msg{font-size:11px;color:var(--red);margin-top:4px;display:none;font-weight:600}
.btn-full{width:100%;padding:14px;border-radius:var(--r);font-size:15px;font-weight:800;border:none;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-orange{background:var(--orange);color:var(--white);box-shadow:0 4px 16px rgba(255,102,0,.25)}
.btn-orange:hover{background:var(--orange2);transform:translateY(-1px)}
.btn-orange:disabled{opacity:.6;cursor:not-allowed;transform:none}
.auth-switch{text-align:center;margin-top:18px;font-size:13px;color:var(--muted)}
.auth-switch a{color:var(--navy);font-weight:700;cursor:pointer;border-bottom:1px solid var(--navy-lt)}
.auth-switch a:hover{border-bottom-color:var(--navy)}
.auth-alert{padding:12px 14px;border-radius:var(--r);font-size:13px;font-weight:600;margin-bottom:16px;display:none}
.auth-alert.err{background:var(--red-lt);color:var(--red);display:block;border:1px solid rgba(204,0,0,.15)}
.auth-alert.ok{background:var(--green-lt);color:var(--green);display:block;border:1px solid rgba(30,86,49,.15)}

/* MAIN */
.main{max-width:860px;margin:0 auto;padding:24px 20px 100px}

/* DASHBOARD */
.dash-hero{background:var(--navy);border-radius:var(--rl);padding:32px;color:var(--white);margin-bottom:24px;position:relative;overflow:hidden}
.dash-hero::after{content:'';position:absolute;top:-40px;right:-40px;width:180px;height:180px;border-radius:50%;background:rgba(255,102,0,.1)}
.dash-hero h2{font-size:24px;font-weight:800;margin-bottom:4px;position:relative;z-index:1}
.dash-hero p{font-size:14px;color:rgba(255,255,255,.55);position:relative;z-index:1}
.dash-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:20px 0 0;position:relative;z-index:1}
.ds{background:rgba(255,255,255,.08);border-radius:var(--r);padding:14px;text-align:center;border:1px solid rgba(255,255,255,.08)}
.ds strong{display:block;font-size:24px;font-weight:800;color:var(--orange);line-height:1}
.ds span{display:block;font-size:10.5px;color:rgba(255,255,255,.5);margin-top:4px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.dash-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:24px}
.dash-card{background:var(--white);border-radius:var(--rl);padding:24px;border:1px solid var(--border);cursor:pointer;transition:all .25s}
.dash-card:hover{transform:translateY(-3px);box-shadow:0 10px 28px rgba(0,51,102,.08);border-color:var(--navy)}
.dash-card .ico{font-size:32px;margin-bottom:10px;display:block}
.dash-card h3{font-size:16px;font-weight:700;color:var(--navy);margin-bottom:4px}
.dash-card p{font-size:12.5px;color:var(--muted);line-height:1.6}
.weak-section{background:var(--white);border-radius:var(--rl);padding:24px;border:1px solid var(--border)}
.weak-section h3{font-size:14px;font-weight:800;color:var(--navy);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.weak-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px}
.weak-item:last-child{border:none}
.weak-item .q{color:var(--ink);font-weight:600;flex:1;margin-right:12px}
.weak-item .pct{font-weight:800;font-size:12px;padding:3px 8px;border-radius:4px}
.pct-low{background:var(--red-lt);color:var(--red)}
.pct-med{background:var(--orange-lt);color:var(--orange2)}
.pct-high{background:var(--green-lt);color:var(--green)}
.empty-state{text-align:center;padding:32px;color:var(--muted);font-size:13.5px}
.empty-state .ico{font-size:40px;display:block;margin-bottom:10px}

/* PROGRESS BAR */
.prog-wrap{margin-bottom:20px}
.prog-head{display:flex;justify-content:space-between;margin-bottom:6px}
.prog-head span{font-size:12px;font-weight:700;color:var(--muted)}
.prog-head strong{font-size:12px;font-weight:800;color:var(--navy)}
.prog-bar{height:7px;background:var(--navy-lt);border-radius:10px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--navy),var(--orange));border-radius:10px;transition:width .5s ease}

/* STUDY CARD */
.study-card{background:var(--white);border-radius:var(--rl);padding:28px;border:1px solid var(--border);box-shadow:0 4px 16px rgba(0,0,0,.04);animation:fadeUp .35s ease;margin-bottom:16px}
.q-badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:800;color:var(--orange);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}
.q-badge .star65{background:var(--green-lt);color:var(--green);font-size:9px;padding:2px 7px;border-radius:4px;font-weight:800;letter-spacing:.03em;border:1px solid rgba(30,86,49,.15)}
.q-text{font-size:20px;font-weight:700;color:var(--ink);line-height:1.4;margin-bottom:8px}
.q-cat{font-size:11.5px;color:var(--muted);font-weight:600;margin-bottom:20px}
.answer-box{background:var(--navy-lt);border-radius:var(--r);padding:16px;margin-bottom:14px;border-left:3px solid var(--navy)}
.answer-box .lbl{font-size:10px;font-weight:800;color:var(--navy);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;display:block}
.answer-box .val{font-size:15px;font-weight:700;color:var(--navy);line-height:1.5}
.hint-box{background:var(--orange-lt);border-radius:var(--r);padding:16px;border-left:3px solid var(--orange);margin-bottom:14px}
.hint-box .lbl{font-size:10px;font-weight:800;color:var(--orange2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;display:flex;align-items:center;gap:5px}
.hint-box .val{font-size:14px;color:var(--ink2);line-height:1.7}
.explain-box{background:#F5F0FF;border-radius:var(--r);padding:16px;border-left:3px solid #7C3AED;margin-bottom:14px}
.explain-box .lbl{font-size:10px;font-weight:800;color:#7C3AED;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;display:block}
.explain-box .val{font-size:13.5px;color:var(--ink2);line-height:1.7}
.study-nav{display:flex;gap:10px;justify-content:space-between;margin-top:8px}
.study-btn{padding:12px 24px;border-radius:var(--r);font-size:13.5px;font-weight:700;border:none;transition:all .2s}
.btn-prev{background:var(--navy-lt);color:var(--navy)}
.btn-prev:hover{background:#d0e3f5}
.btn-next{background:var(--orange);color:var(--white)}
.btn-next:hover{background:var(--orange2);transform:translateY(-1px)}
.btn-next:disabled,.btn-prev:disabled{opacity:.4;cursor:not-allowed;transform:none}
.study-filters{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.sf{padding:7px 14px;border-radius:20px;font-size:11.5px;font-weight:700;border:1.5px solid var(--border);background:var(--white);color:var(--muted);transition:all .2s}
.sf:hover,.sf.active{border-color:var(--navy);background:var(--navy);color:var(--white)}

/* QUIZ */
.quiz-setup{text-align:center;padding:40px 20px}
.quiz-setup h2{font-size:26px;font-weight:800;color:var(--navy);margin-bottom:8px}
.quiz-setup p{font-size:14px;color:var(--muted);margin-bottom:28px;max-width:400px;margin-left:auto;margin-right:auto;line-height:1.7}
.quiz-opts{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:400px;margin:0 auto 24px}
.qopt{padding:18px;border-radius:var(--rl);border:2px solid var(--border);background:var(--white);text-align:center;cursor:pointer;transition:all .2s}
.qopt:hover{border-color:var(--navy);transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,51,102,.08)}
.qopt.selected{border-color:var(--orange);background:var(--orange-lt)}
.qopt strong{display:block;font-size:28px;font-weight:800;color:var(--navy)}
.qopt span{font-size:11px;color:var(--muted);font-weight:600}
.quiz-start-btn{padding:16px 48px;border-radius:var(--r);font-size:16px;font-weight:800;border:none;background:var(--orange);color:var(--white);box-shadow:0 6px 20px rgba(255,102,0,.3);transition:all .2s;animation:pulse 2.5s ease infinite}
.quiz-start-btn:hover{background:var(--orange2);transform:translateY(-2px);animation:none}

.quiz-card{background:var(--white);border-radius:var(--rl);padding:28px;border:1px solid var(--border);box-shadow:0 4px 16px rgba(0,0,0,.04);animation:fadeUp .35s ease}
.quiz-options{display:grid;gap:8px;margin:20px 0}
.qo-btn{width:100%;padding:14px 16px;border-radius:var(--r);border:2px solid var(--border);background:var(--white);font-size:14px;font-weight:600;color:var(--ink);text-align:left;transition:all .2s;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif}
.qo-btn:hover:not(.answered){border-color:var(--navy);background:var(--navy-lt)}
.qo-btn.correct{border-color:var(--green);background:var(--green-lt);color:var(--green);font-weight:700}
.qo-btn.wrong{border-color:var(--red);background:var(--red-lt);color:var(--red);animation:shake .4s ease}
.qo-btn.answered{cursor:default;pointer-events:none}
.qo-btn.show-correct{border-color:var(--green);background:var(--green-lt);color:var(--green);font-weight:700}
.quiz-feedback{margin-top:16px;padding:14px;border-radius:var(--r);font-size:13.5px;font-weight:600;line-height:1.6;display:none;animation:popIn .3s ease}
.quiz-feedback.correct{display:block;background:var(--green-lt);color:var(--green);border:1px solid rgba(30,86,49,.15)}
.quiz-feedback.wrong{display:block;background:var(--red-lt);color:var(--red);border:1px solid rgba(204,0,0,.12)}

/* QUIZ RESULT */
.quiz-result{text-align:center;padding:40px 20px;animation:popIn .5s ease}
.result-circle{width:140px;height:140px;border-radius:50%;margin:0 auto 20px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:42px;font-weight:800;line-height:1}
.result-circle.pass{background:var(--green-lt);color:var(--green);border:4px solid var(--green)}
.result-circle.fail{background:var(--red-lt);color:var(--red);border:4px solid var(--red)}
.result-circle sub{font-size:14px;font-weight:600;opacity:.7}
.quiz-result h2{font-size:28px;font-weight:800;margin-bottom:6px}
.quiz-result h2.pass{color:var(--green)}
.quiz-result h2.fail{color:var(--red)}
.quiz-result>p{font-size:14px;color:var(--muted);margin-bottom:24px;max-width:380px;margin-left:auto;margin-right:auto;line-height:1.7}
.result-details{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;max-width:400px;margin:0 auto 28px}
.rd{background:var(--white);border-radius:var(--r);padding:14px;border:1px solid var(--border)}
.rd strong{display:block;font-size:22px;font-weight:800;line-height:1}
.rd span{font-size:10.5px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.03em}
.result-wrongs{background:var(--white);border-radius:var(--rl);padding:20px;border:1px solid var(--border);text-align:left;max-width:500px;margin:0 auto 24px}
.result-wrongs h4{font-size:12px;font-weight:800;color:var(--red);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px}
.rw-item{padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;color:var(--ink2);line-height:1.5}
.rw-item:last-child{border:none}
.rw-item strong{color:var(--green);display:block;font-size:12px;margin-top:3px}
.result-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}

/* COMMANDS */
.cmd-card{background:var(--white);border-radius:var(--r);padding:16px;border:1px solid var(--border);display:flex;align-items:center;gap:14px;transition:all .2s;margin-bottom:8px;animation:fadeUp .3s ease}
.cmd-card:hover{border-color:var(--navy);transform:translateX(4px)}
.cmd-n{min-width:36px;height:36px;border-radius:50%;background:var(--navy);color:var(--white);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0}
.cmd-en{font-size:14.5px;font-weight:700;color:var(--ink)}
.cmd-pt{font-size:12px;color:var(--muted);margin-top:2px}
.section-title{font-size:11px;font-weight:800;color:var(--orange);letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px}
.section-h{font-size:26px;font-weight:800;color:var(--navy);margin-bottom:18px;letter-spacing:-.02em}
.rule-card{background:var(--navy-lt);border-radius:var(--rl);padding:24px;border:1px solid rgba(0,51,102,.12);margin-top:20px}
.rule-card h3{font-size:15px;font-weight:800;color:var(--navy);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.rule-card p{font-size:13.5px;color:var(--ink2);line-height:1.7}
.tips-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:20px}
.tip-card{background:var(--white);border-radius:var(--r);padding:16px;border:1px solid var(--border)}
.tip-card h4{font-size:12px;font-weight:800;color:var(--navy);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em}
.tip-card p{font-size:13px;color:var(--ink2);line-height:1.7}

/* RESPONSIVE */
@media(max-width:768px){
  .nav{padding:12px 16px}
  .main{padding:16px 14px 80px}
  .dash-stats{grid-template-columns:repeat(2,1fr)}
  .dash-grid{grid-template-columns:1fr}
  .quiz-opts{grid-template-columns:1fr}
  .tips-grid{grid-template-columns:1fr}
  .result-details{grid-template-columns:1fr}
  .study-card,.quiz-card{padding:20px}
  .q-text{font-size:17px}
  .tabs{padding:0 8px}
  .tab{padding:12px 14px;font-size:11.5px}
}
@media(max-width:480px){
  .dash-hero{padding:24px}
  .dash-hero h2{font-size:20px}
  .ds strong{font-size:20px}
}
</style>
</head>
<body>

<div id="app"></div>

// ---- 128 USCIS CIVICS QUESTIONS ----
const questions = [
  // AMERICAN GOVERNMENT — A: Principles of American Democracy
  {id:1,q:"What is the supreme law of the land?",a:"The Constitution",opts:["The Constitution","The Declaration of Independence","The Bill of Rights","Federal law"],cat:"Princípios da Democracia",hint:"Suprema = a mais alta. A Constituição está acima de todas as outras leis.",explain:"A Constituição dos EUA é o documento mais importante do país. Nenhuma lei pode contradizê-la.",is65:true},
  {id:2,q:"What does the Constitution do?",a:"Sets up the government / Defines the government / Protects basic rights of Americans",opts:["Sets up the government","Only protects rights","Only creates laws","Only defines the president's role"],cat:"Princípios da Democracia",hint:"A Constituição faz 3 coisas: monta o governo, define como funciona, e protege seus direitos.",explain:"A Constituição organiza todo o sistema de governo e garante direitos fundamentais.",is65:true},
  {id:3,q:"The idea of self-government is in the first three words of the Constitution. What are these words?",a:"We the People",opts:["We the People","In God We Trust","Life and Liberty","United We Stand"],cat:"Princípios da Democracia",hint:"'We the People' = Nós, o Povo. O poder vem do povo, não do governo. As 3 primeiras palavras dizem isso.",explain:"'We the People' mostra que o governo existe para servir o povo, não o contrário.",is65:true},
  {id:4,q:"What is an amendment?",a:"A change (to the Constitution) / An addition (to the Constitution)",opts:["A change to the Constitution","A new law","A presidential order","A court decision"],cat:"Princípios da Democracia",hint:"Amendment = emenda. Pense em 'emendar' uma roupa — é consertar, mudar, melhorar.",explain:"Um amendment é uma mudança ou adição à Constituição. Já foram feitas 27 emendas.",is65:true},
  {id:5,q:"What do we call the first ten amendments to the Constitution?",a:"The Bill of Rights",opts:["The Bill of Rights","The Constitution","The Declaration","The Preamble"],cat:"Princípios da Democracia",hint:"Bill of Rights = Carta de Direitos. As 10 primeiras emendas protegem SEUS direitos básicos.",explain:"O Bill of Rights foi adicionado em 1791 para garantir liberdades individuais como expressão, religião e armas.",is65:true},
  {id:6,q:"What is one right or freedom from the First Amendment?",a:"Speech / Religion / Assembly / Press / Petition the government",opts:["Speech","Right to bear arms","Right to vote","Right to a trial"],cat:"Princípios da Democracia",hint:"A 1ª Emenda = RAPPS: Religion, Assembly, Press, Petition, Speech. 5 liberdades na número 1.",explain:"A Primeira Emenda garante 5 liberdades fundamentais: religião, assembleia, imprensa, petição e expressão.",is65:true},
  {id:7,q:"How many amendments does the Constitution have?",a:"Twenty-seven (27)",opts:["Twenty-seven (27)","Twenty-five (25)","Thirty (30)","Ten (10)"],cat:"Princípios da Democracia",hint:"27 emendas. Pense: 3 × 9 = 27. Ou: 2-7, dois dígitos simples juntos.",explain:"A Constituição tem 27 emendas. A primeira foi em 1791 (Bill of Rights) e a última em 1992.",is65:true},
  {id:8,q:"What did the Declaration of Independence do?",a:"Announced our independence (from Great Britain) / Declared our independence / Said the United States is free",opts:["Announced our independence from Great Britain","Created the Constitution","Freed the slaves","Started the government"],cat:"Princípios da Democracia",hint:"Declaration = Declaração. Independence = Independência. O nome diz tudo: declarou a independência.",explain:"Assinada em 4 de julho de 1776, a Declaração de Independência disse ao mundo que os EUA eram livres da Inglaterra.",is65:true},
  {id:9,q:"What are two rights in the Declaration of Independence?",a:"Life / Liberty / Pursuit of happiness",opts:["Life, liberty, pursuit of happiness","Speech and religion","Vote and work","Bear arms and assemble"],cat:"Princípios da Democracia",hint:"Vida, Liberdade e Busca da Felicidade. São os 3 direitos naturais. Todo ser humano nasce com eles.",explain:"A Declaração afirma que todos têm direito à vida, liberdade e busca da felicidade — são direitos 'inalienáveis'.",is65:true},
  {id:10,q:"What is freedom of religion?",a:"You can practice any religion, or not practice a religion",opts:["You can practice any religion or none","You must be Christian","The government chooses your religion","Only certain religions are allowed"],cat:"Princípios da Democracia",hint:"Liberdade de religião = escolha total. Qualquer religião ou nenhuma. Ninguém manda na sua fé.",explain:"Nos EUA, o governo não pode obrigar ninguém a seguir ou não seguir uma religião.",is65:true},
  {id:11,q:"What is the economic system in the United States?",a:"Capitalist economy / Market economy",opts:["Capitalist/market economy","Socialist economy","Communist economy","Mixed planned economy"],cat:"Princípios da Democracia",hint:"EUA = capitalismo. Mercado livre. Você pode abrir um negócio, competir, lucrar.",explain:"Os EUA têm uma economia capitalista (ou de mercado), onde empresas e indivíduos competem livremente.",is65:true},
  {id:12,q:"What is the 'rule of law'?",a:"Everyone must follow the law / Leaders must obey the law / Government must obey the law / No one is above the law",opts:["Everyone must follow the law","Only citizens follow the law","The president makes all laws","Laws only apply to immigrants"],cat:"Princípios da Democracia",hint:"Rule of law = ninguém está acima da lei. Nem o presidente. A lei vale pra TODO MUNDO.",explain:"O 'rule of law' significa que a lei se aplica igualmente a todos, incluindo líderes do governo.",is65:true},

  // B: System of Government
  {id:13,q:"Name one branch or part of the government.",a:"Congress / Legislative / President / Executive / The courts / Judicial",opts:["Legislative (Congress)","Military","Police","Federal Reserve"],cat:"Sistema de Governo",hint:"3 ramos: Legislative (faz leis), Executive (executa), Judicial (julga). LEJ — fácil de lembrar.",explain:"O governo tem 3 ramos que se equilibram: Legislativo (Congress), Executivo (Presidente) e Judiciário (Cortes).",is65:true},
  {id:14,q:"What stops one branch of government from becoming too powerful?",a:"Checks and balances / Separation of powers",opts:["Checks and balances","The military","The president","The Constitution only"],cat:"Sistema de Governo",hint:"Checks and balances = cada ramo vigia o outro. Nenhum fica poderoso demais. É um jogo de equilíbrio.",explain:"Checks and balances significa que cada ramo do governo pode limitar o poder dos outros dois.",is65:true},
  {id:15,q:"Who is in charge of the executive branch?",a:"The President",opts:["The President","The Speaker of the House","The Chief Justice","Congress"],cat:"Sistema de Governo",hint:"Executive = executa. Quem executa? O Presidente. Ele é o chefe do ramo executivo.",explain:"O Presidente lidera o ramo executivo, que é responsável por aplicar e fazer cumprir as leis.",is65:true},
  {id:16,q:"Who makes federal laws?",a:"Congress / Senate and House (of Representatives) / (U.S. or national) legislature",opts:["Congress","The President","The Supreme Court","State governors"],cat:"Sistema de Governo",hint:"Congress = faz leis. Senado + House = Congress. Eles escrevem, votam e aprovam as leis federais.",explain:"O Congresso (Senado + Câmara dos Representantes) é o ramo legislativo que cria as leis federais.",is65:true},
  {id:17,q:"What are the two parts of the U.S. Congress?",a:"The Senate and House (of Representatives)",opts:["The Senate and House of Representatives","The Supreme Court and Congress","The President and Vice President","The Senate and Cabinet"],cat:"Sistema de Governo",hint:"Congress = 2 casas. Senate (100 membros) + House (435 membros). Duas casas, um Congress.",explain:"O Congresso é bicameral: o Senado (100 membros) e a Câmara dos Representantes (435 membros).",is65:true},
  {id:18,q:"How many U.S. senators are there?",a:"One hundred (100)",opts:["One hundred (100)","Fifty (50)","Two hundred (200)","Four hundred thirty-five (435)"],cat:"Sistema de Governo",hint:"100 senadores. 2 por estado × 50 estados = 100. Conta de cabeça, sem decorar.",explain:"Cada estado tem exatamente 2 senadores, independente do tamanho. 2 × 50 = 100.",is65:true},
  {id:19,q:"We elect a U.S. senator for how many years?",a:"Six (6)",opts:["Six (6)","Four (4)","Two (2)","Eight (8)"],cat:"Sistema de Governo",hint:"SEnador = SEis anos. As duas primeiras letras da palavra já entregam o número.",explain:"Senadores servem mandatos de 6 anos. A cada 2 anos, cerca de 1/3 do Senado é reeleito.",is65:true},
  {id:20,q:"Who is one of your state's U.S. senators now?",a:"(Depends on state)",opts:[],cat:"Sistema de Governo",hint:"Essa resposta muda pelo seu estado. O app personaliza pra você. Decore os dois nomes do seu estado!",explain:"Cada estado tem 2 senadores. Você precisa saber pelo menos o nome de um deles.",is65:true,stateAnswer:"senators"},
  {id:21,q:"The House of Representatives has how many voting members?",a:"Four hundred thirty-five (435)",opts:["Four hundred thirty-five (435)","One hundred (100)","Five hundred (500)","Two hundred (200)"],cat:"Sistema de Governo",hint:"435 representantes. Estados maiores têm mais. Número difícil? Lembre: 4-3-5, sequência decrescente.",explain:"A Câmara tem 435 membros com direito a voto. O número de representantes de cada estado depende da população.",is65:true},
  {id:22,q:"We elect a U.S. representative for how many years?",a:"Two (2)",opts:["Two (2)","Four (4)","Six (6)","Eight (8)"],cat:"Sistema de Governo",hint:"Representative = 2 anos. Mandato curto porque precisam ouvir o povo com mais frequência.",explain:"Representantes servem mandatos de 2 anos, o que os mantém mais próximos dos eleitores.",is65:true},
  {id:23,q:"Name your U.S. representative.",a:"(Depends on district)",opts:[],cat:"Sistema de Governo",hint:"Esse muda pelo seu district! Pesquise no house.gov pelo seu CEP. Decorar o nome é essencial.",explain:"Cada congressional district tem 1 representante. Você precisa saber o nome do seu.",is65:false},
  {id:24,q:"Who does a U.S. senator represent?",a:"All people of the state",opts:["All people of the state","Only voters","Only their party","Only their district"],cat:"Sistema de Governo",hint:"Senador representa TODO o estado. Não é um pedaço — é o estado inteiro.",explain:"Diferente dos representantes (que representam distritos), senadores representam todos os habitantes do estado.",is65:true},
  {id:25,q:"Why do some states have more representatives than other states?",a:"Because of the state's population / Because they have more people / Because some states have more people",opts:["Because of the state's population","Because of the state's size","Because of the state's age","Because of the state's wealth"],cat:"Sistema de Governo",hint:"Mais gente = mais representantes. California (muita gente) tem 52. Wyoming (pouca) tem 1.",explain:"O número de representantes é proporcional à população. Estados populosos têm mais representantes.",is65:true},
  {id:26,q:"We elect a president for how many years?",a:"Four (4)",opts:["Four (4)","Two (2)","Six (6)","Eight (8)"],cat:"Sistema de Governo",hint:"Presidente = 4 anos. Four = 4 letras. President = mandato de 4.",explain:"O presidente serve um mandato de 4 anos e pode ser reeleito uma vez (máximo de 8 anos).",is65:true},
  {id:27,q:"In what month do we vote for president?",a:"November",opts:["November","January","July","September"],cat:"Sistema de Governo",hint:"November = novembro. A eleição é sempre na primeira terça-feira após a primeira segunda de novembro.",explain:"As eleições presidenciais americanas acontecem na primeira terça-feira após a primeira segunda-feira de novembro.",is65:true},
  {id:28,q:"What is the name of the President of the United States now?",a:"Donald Trump",opts:["Donald Trump","Joe Biden","Barack Obama","Mike Pence"],cat:"Sistema de Governo",hint:"Donald Trump é o 47º presidente, inaugurado em janeiro de 2025.",explain:"Donald Trump venceu a eleição de 2024 e é o atual presidente dos Estados Unidos.",is65:true},
  {id:29,q:"What is the name of the Vice President of the United States now?",a:"JD Vance",opts:["JD Vance","Kamala Harris","Mike Pence","Tim Walz"],cat:"Sistema de Governo",hint:"JD Vance é o vice-presidente desde janeiro de 2025.",explain:"JD Vance é o vice-presidente dos Estados Unidos sob a administração Trump.",is65:true},
  {id:30,q:"If the President can no longer serve, who becomes President?",a:"The Vice President",opts:["The Vice President","The Speaker of the House","The Secretary of State","The Chief Justice"],cat:"Sistema de Governo",hint:"Vice = substituto. Se o presidente não pode servir, o vice assume. É o plano B número 1.",explain:"A linha de sucessão começa com o Vice-Presidente, seguido pelo Speaker of the House.",is65:true},
  {id:31,q:"If both the President and the Vice President can no longer serve, who becomes President?",a:"The Speaker of the House",opts:["The Speaker of the House","The Secretary of State","The Chief Justice","The Senate Majority Leader"],cat:"Sistema de Governo",hint:"Speaker of the House = 3º na linha. Presidente cai, vice cai, Speaker assume. É o plano C.",explain:"O Speaker of the House (Presidente da Câmara) é o terceiro na linha de sucessão presidencial.",is65:true},
  {id:32,q:"Who is the Commander in Chief of the military?",a:"The President",opts:["The President","The Secretary of Defense","A general","The Vice President"],cat:"Sistema de Governo",hint:"O Presidente é o chefe das Forças Armadas. Mesmo sendo civil, ele comanda os militares.",explain:"A Constituição designa o Presidente como Commander in Chief de todas as forças militares.",is65:true},
  {id:33,q:"Who signs bills to become laws?",a:"The President",opts:["The President","Congress","The Supreme Court","The Vice President"],cat:"Sistema de Governo",hint:"Bill = projeto de lei. Congress escreve, Presidente assina. A assinatura transforma bill em law.",explain:"O Congresso aprova os projetos de lei (bills) e o Presidente os assina para que se tornem leis.",is65:true},
  {id:34,q:"Who vetoes bills?",a:"The President",opts:["The President","Congress","The Supreme Court","The Speaker"],cat:"Sistema de Governo",hint:"Veto = 'eu recuso'. O Presidente pode vetar (recusar) um bill. Congress pode derrubar o veto com 2/3 dos votos.",explain:"O Presidente tem o poder de vetar projetos de lei, mas o Congresso pode anular o veto com maioria de 2/3.",is65:true},
  {id:35,q:"What does the President's Cabinet do?",a:"Advises the President",opts:["Advises the President","Makes laws","Judges cases","Commands the military"],cat:"Sistema de Governo",hint:"Cabinet = gabinete de conselheiros. Eles aconselham o Presidente em diferentes áreas (saúde, defesa, educação...).",explain:"O Cabinet é composto pelos chefes dos departamentos federais que aconselham o Presidente.",is65:true},
  {id:36,q:"What are two Cabinet-level positions?",a:"Secretary of State / Secretary of Defense / Secretary of Education / Secretary of Energy / Attorney General / etc.",opts:["Secretary of State, Secretary of Defense","Senator, Representative","Governor, Mayor","Chief Justice, Speaker"],cat:"Sistema de Governo",hint:"Secretary of... alguma coisa. State, Defense, Education, Treasury — são todos cargos do Cabinet.",explain:"Exemplos: Secretary of State, Secretary of Defense, Secretary of Education, Attorney General, etc.",is65:true},
  {id:37,q:"What does the judicial branch do?",a:"Reviews laws / Explains laws / Resolves disputes / Decides if a law goes against the Constitution",opts:["Reviews and explains laws","Makes laws","Enforces laws","Collects taxes"],cat:"Sistema de Governo",hint:"Judicial = juízes. Eles JULGAM se as leis estão certas e de acordo com a Constituição.",explain:"O ramo judiciário interpreta as leis e decide se elas são constitucionais.",is65:true},
  {id:38,q:"What is the highest court in the United States?",a:"The Supreme Court",opts:["The Supreme Court","The Federal Court","Congress","The Appeals Court"],cat:"Sistema de Governo",hint:"Supreme = suprema, a mais alta. Supreme Court = a corte mais importante dos EUA.",explain:"A Supreme Court é o tribunal mais alto do país. Suas decisões são finais e definitivas.",is65:true},
  {id:39,q:"How many justices are on the Supreme Court?",a:"Nine (9)",opts:["Nine (9)","Seven (7)","Twelve (12)","Five (5)"],cat:"Sistema de Governo",hint:"9 juízes — número ímpar para nunca ter empate na votação. A lógica ensina o número.",explain:"A Supreme Court tem 9 justices (juízes). O número ímpar garante que sempre haverá maioria nas decisões.",is65:true},
  {id:40,q:"Who is the Chief Justice of the United States now?",a:"John Roberts",opts:["John Roberts","Clarence Thomas","Samuel Alito","Sonia Sotomayor"],cat:"Sistema de Governo",hint:"John Roberts — ele é o Chief (chefe) Justice desde 2005. Roberts = o chefe da Suprema Corte.",explain:"John Roberts é o Chief Justice (presidente) da Supreme Court desde 2005.",is65:false},
  {id:41,q:"Under our Constitution, some powers belong to the federal government. What is one power of the federal government?",a:"To print money / To declare war / To create an army / To make treaties",opts:["To print money","To provide schooling","To provide police departments","To issue driver's licenses"],cat:"Sistema de Governo",hint:"Federal = poderes grandes. Dinheiro, guerra, exército, tratados. Coisas que um estado sozinho não faz.",explain:"O governo federal tem poderes exclusivos como imprimir dinheiro, declarar guerra e criar tratados internacionais.",is65:true},
  {id:42,q:"Under our Constitution, some powers belong to the states. What is one power of the states?",a:"Provide schooling and education / Provide protection (police) / Provide safety (fire departments) / Give a driver's license / Approve zoning and land use",opts:["Provide schooling and education","Print money","Declare war","Make treaties"],cat:"Sistema de Governo",hint:"Estados = coisas do dia a dia. Escola, polícia, bombeiros, carteira de motorista. O que você usa localmente.",explain:"Os estados cuidam de educação, polícia, bombeiros, licenças e outras questões locais.",is65:true},
  {id:43,q:"Who is the Governor of your state now?",a:"(Depends on state)",opts:[],cat:"Sistema de Governo",hint:"Essa resposta depende do seu estado! O app personaliza. Decore o nome do seu governor.",explain:"O governor (governador) é o chefe do poder executivo do seu estado.",is65:true,stateAnswer:"governor"},
  {id:44,q:"What is the capital of your state?",a:"(Depends on state)",opts:[],cat:"Sistema de Governo",hint:"A capital do seu estado nem sempre é a cidade maior! O app mostra a correta pro seu estado.",explain:"Cada estado tem sua capital, que é onde fica o governo estadual.",is65:true,stateAnswer:"capital"},
  {id:45,q:"What are the two major political parties in the United States?",a:"Democratic and Republican",opts:["Democratic and Republican","Liberal and Conservative","Labor and Green","Federalist and Anti-Federalist"],cat:"Sistema de Governo",hint:"Dois partidos: Democrat (burro/azul) e Republican (elefante/vermelho). D e R — os dois grandes.",explain:"Os dois principais partidos são o Democrata e o Republicano. Dominam a política americana há mais de 150 anos.",is65:true},
  {id:46,q:"What is the political party of the President now?",a:"Republican",opts:["Republican","Democratic","Independent","Libertarian"],cat:"Sistema de Governo",hint:"Donald Trump é Republicano. Partido Republicano = Republican Party.",explain:"Donald Trump é membro do Partido Republicano (Republican Party).",is65:true},
  {id:47,q:"What is the name of the Speaker of the House of Representatives now?",a:"Mike Johnson",opts:["Mike Johnson","Nancy Pelosi","Kevin McCarthy","Hakeem Jeffries"],cat:"Sistema de Governo",hint:"Mike Johnson é o Speaker of the House desde 2023.",explain:"O Speaker of the House preside a Câmara dos Representantes e é o terceiro na linha de sucessão.",is65:false},

  // C: Rights and Responsibilities
  {id:48,q:"There are four amendments to the Constitution about who can vote. Describe one of them.",a:"Citizens eighteen (18) and older can vote / You don't have to pay to vote / Any citizen can vote (man or woman) / A male citizen of any race can vote",opts:["Citizens 18 and older can vote","Only men can vote","Only property owners can vote","Only English speakers can vote"],cat:"Direitos e Responsabilidades",hint:"4 emendas sobre voto: idade 18+, sem taxa, qualquer raça, homem ou mulher. Todos podem votar!",explain:"As Emendas 15, 19, 24 e 26 expandiram o direito de voto: raça, sexo, taxa e idade.",is65:true},
  {id:49,q:"What is one responsibility that is only for United States citizens?",a:"Serve on a jury / Vote in a federal election",opts:["Serve on a jury","Pay taxes","Obey the law","Attend school"],cat:"Direitos e Responsabilidades",hint:"Só cidadãos: JÚRI e VOTAR em eleição federal. Residentes pagam impostos, mas não podem fazer essas duas coisas.",explain:"Servir como jurado e votar em eleições federais são responsabilidades exclusivas de cidadãos.",is65:true},
  {id:50,q:"Name one right only for United States citizens.",a:"Vote in a federal election / Run for federal office",opts:["Vote in a federal election","Freedom of speech","Right to work","Right to education"],cat:"Direitos e Responsabilidades",hint:"Só cidadãos votam em eleição federal e podem concorrer a cargo federal. Green card não dá esses direitos.",explain:"Votar em eleições federais e concorrer a cargos federais são direitos exclusivos de cidadãos.",is65:true},
  {id:51,q:"What are two rights of everyone living in the United States?",a:"Freedom of expression / Freedom of speech / Freedom of assembly / Freedom to petition the government / Freedom of religion / The right to bear arms",opts:["Freedom of speech and freedom of religion","Vote and serve on jury","Run for office and vote","Drive and own property"],cat:"Direitos e Responsabilidades",hint:"Direitos de TODOS (cidadãos ou não): expressão, religião, assembleia, petição, portar armas.",explain:"Certos direitos constitucionais se aplicam a todas as pessoas nos EUA, não apenas cidadãos.",is65:true},
  {id:52,q:"What do we show loyalty to when we say the Pledge of Allegiance?",a:"The United States / The flag",opts:["The United States and the flag","The President","The military","The Constitution only"],cat:"Direitos e Responsabilidades",hint:"Pledge of Allegiance = juramento à bandeira e ao país. 'I pledge allegiance to the flag...'",explain:"O Pledge of Allegiance é um juramento de lealdade à bandeira e à nação americana.",is65:true},
  {id:53,q:"What is one promise you make when you become a United States citizen?",a:"Give up loyalty to other countries / Defend the Constitution and laws / Obey the laws / Serve in the U.S. military (if needed) / Serve the nation (if needed) / Be loyal to the United States",opts:["Defend the Constitution and laws","Always vote","Learn English perfectly","Never travel abroad"],cat:"Direitos e Responsabilidades",hint:"Na naturalização, você promete: lealdade aos EUA, defender a Constituição, obedecer leis, servir se necessário.",explain:"O Oath of Allegiance inclui promessas de lealdade, defesa e serviço aos Estados Unidos.",is65:true},
  {id:54,q:"How old do citizens have to be to vote for President?",a:"Eighteen (18) and older",opts:["Eighteen (18)","Twenty-one (21)","Sixteen (16)","Twenty-five (25)"],cat:"Direitos e Responsabilidades",hint:"18 anos = idade pra votar. Mesma idade de ser adulto. 18 = voto + adulto.",explain:"A 26ª Emenda (1971) estabeleceu 18 anos como a idade mínima para votar.",is65:true},
  {id:55,q:"What are two ways that Americans can participate in their democracy?",a:"Vote / Join a political party / Help with a campaign / Join a civic group / Join a community group / Give an elected official your opinion / Call senators and representatives / Publicly support or oppose an issue or policy / Run for office / Write to a newspaper",opts:["Vote and join a political party","Pay taxes and obey laws","Work and go to school","Watch the news and read"],cat:"Direitos e Responsabilidades",hint:"Participar = votar, apoiar campanha, ligar pro senador, entrar em partido, concorrer a cargo...",explain:"Há muitas formas de participar: votar, ajudar campanhas, entrar em grupos cívicos, contactar representantes.",is65:true},
  {id:56,q:"When is the last day you can send in federal income tax forms?",a:"April 15",opts:["April 15","March 15","January 1","December 31"],cat:"Direitos e Responsabilidades",hint:"15 de abril = Tax Day. Todo ano, sem falta. Abril = imposto. 15/4 na cabeça!",explain:"O prazo para entregar a declaração de imposto de renda federal é 15 de abril de cada ano.",is65:true},
  {id:57,q:"When must all men register for the Selective Service?",a:"At age eighteen (18) / Between eighteen (18) and twenty-six (26)",opts:["At age 18 (between 18 and 26)","At age 16","At age 21","When they get a job"],cat:"Direitos e Responsabilidades",hint:"Selective Service = registro militar. Homens entre 18-26 anos. 18 = voto + registro militar.",explain:"Todos os homens residentes nos EUA devem se registrar no Selective Service entre 18 e 26 anos.",is65:true},

  // AMERICAN HISTORY — A: Colonial Period and Independence
  {id:58,q:"What is one reason colonists came to America?",a:"Freedom / Political liberty / Religious freedom / Economic opportunity / Practice their religion / Escape persecution",opts:["Freedom and economic opportunity","To find gold only","To conquer Native Americans","To build military bases"],cat:"Período Colonial",hint:"3 motivos: liberdade religiosa, liberdade política, oportunidade econômica. Fugiam de perseguição na Europa.",explain:"Os colonos vieram por liberdade religiosa, política e oportunidades econômicas.",is65:true},
  {id:59,q:"Who lived in America before the Europeans arrived?",a:"American Indians / Native Americans",opts:["American Indians / Native Americans","No one","Africans","Mexicans"],cat:"Período Colonial",hint:"Native Americans = indígenas americanos. Eles já estavam lá milhares de anos antes dos europeus.",explain:"Os nativos americanos (American Indians) viviam nas Américas milhares de anos antes da chegada dos europeus.",is65:true},
  {id:60,q:"What group of people was taken to America and sold as slaves?",a:"Africans / People from Africa",opts:["Africans","Europeans","Asians","Native Americans"],cat:"Período Colonial",hint:"Africanos foram trazidos à força e vendidos como escravos. A escravidão é parte dolorosa da história americana.",explain:"Milhões de africanos foram sequestrados e trazidos para a América como escravos entre os séculos XVII e XIX.",is65:true},
  {id:61,q:"Why did the colonists fight the British?",a:"Because of high taxes (taxation without representation) / Because the British army stayed in their houses / Because they didn't have self-government",opts:["High taxes without representation","They wanted to be British","The British were leaving","They wanted more trade"],cat:"Período Colonial",hint:"'No taxation without representation!' = Sem imposto sem representação! A famosa frase da revolução.",explain:"Os colonos se revoltaram por impostos altos sem representação no parlamento britânico, entre outras razões.",is65:true},
  {id:62,q:"Who wrote the Declaration of Independence?",a:"(Thomas) Jefferson",opts:["Thomas Jefferson","George Washington","Benjamin Franklin","John Adams"],cat:"Período Colonial",hint:"Jefferson escreveu. Washington lutou. Franklin ajudou. Mas a caneta era de JEFFERSON.",explain:"Thomas Jefferson foi o principal autor da Declaração de Independência, escrita em 1776.",is65:true},
  {id:63,q:"When was the Declaration of Independence adopted?",a:"July 4, 1776",opts:["July 4, 1776","July 4, 1789","January 1, 1776","December 25, 1776"],cat:"Período Colonial",hint:"4 de julho de 1776. O aniversário da América. Todo ano tem fogos de artifício — a data nunca muda.",explain:"A Declaração de Independência foi adotada pelo Congresso Continental em 4 de julho de 1776.",is65:true},
  {id:64,q:"There were 13 original states. Name three.",a:"New Hampshire / Massachusetts / Rhode Island / Connecticut / New York / New Jersey / Pennsylvania / Delaware / Maryland / Virginia / North Carolina / South Carolina / Georgia",opts:["New York, Virginia, Massachusetts","California, Texas, Florida","Ohio, Michigan, Illinois","Alaska, Hawaii, Montana"],cat:"Período Colonial",hint:"Os 13 originais ficam todos na costa leste. New York, Virginia, Massachusetts, Pennsylvania, Georgia...",explain:"As 13 colônias originais ficavam todas na costa leste dos EUA.",is65:true},
  {id:65,q:"What happened at the Constitutional Convention?",a:"The Constitution was written / The Founding Fathers wrote the Constitution",opts:["The Constitution was written","Independence was declared","Slavery was abolished","The Bill of Rights was added"],cat:"Período Colonial",hint:"Constitutional Convention = onde a Constituição foi escrita. 1787, Filadélfia. Os Founding Fathers sentaram e escreveram.",explain:"Em 1787, delegados se reuniram na Filadélfia e escreveram a Constituição dos EUA.",is65:true},
  {id:66,q:"When was the Constitution written?",a:"1787",opts:["1787","1776","1791","1800"],cat:"Período Colonial",hint:"1787 = Constituição escrita. 1776 = Independência. São 11 anos de diferença. 76 → 87.",explain:"A Constituição foi escrita em 1787 durante a Constitutional Convention na Filadélfia.",is65:true},
  {id:67,q:"The Federalist Papers supported the passage of the U.S. Constitution. Name one of the writers.",a:"(James) Madison / (Alexander) Hamilton / (John) Jay / Publius",opts:["Alexander Hamilton","Thomas Jefferson","George Washington","Benjamin Franklin"],cat:"Período Colonial",hint:"Hamilton, Madison e Jay escreveram os Federalist Papers. Hamilton é o mais famoso (musical da Broadway!).",explain:"Os Federalist Papers foram escritos por Hamilton, Madison e Jay para defender a ratificação da Constituição.",is65:false},
  {id:68,q:"What is one thing Benjamin Franklin is famous for?",a:"U.S. diplomat / Oldest member of the Constitutional Convention / First Postmaster General / Writer of 'Poor Richard's Almanac' / Started the first free libraries",opts:["U.S. diplomat and inventor","First President","Wrote the Constitution alone","Led the army"],cat:"Período Colonial",hint:"Franklin fez de tudo: diplomata, inventor, escritor, criou bibliotecas e correios. O homem dos $100.",explain:"Benjamin Franklin foi diplomata, inventor, escritor e um dos Founding Fathers mais versáteis.",is65:true},
  {id:69,q:"Who is the 'Father of Our Country'?",a:"(George) Washington",opts:["George Washington","Thomas Jefferson","Abraham Lincoln","Benjamin Franklin"],cat:"Período Colonial",hint:"Washington = Pai da Pátria. 1º presidente, general da revolução. O número 1 em tudo. O primeiro.",explain:"George Washington é chamado de 'Father of Our Country' por ser o primeiro presidente e líder da revolução.",is65:true},

  // B: 1800s
  {id:70,q:"What territory did the United States buy from France in 1803?",a:"The Louisiana Territory / Louisiana",opts:["The Louisiana Territory","Alaska","Florida","Texas"],cat:"Anos 1800",hint:"Louisiana Purchase, 1803. Comprou da França (Napoleão). Dobrou o tamanho do país de uma vez.",explain:"Os EUA compraram o Território da Louisiana da França em 1803, dobrando o tamanho do país.",is65:true},
  {id:71,q:"Name one war fought by the United States in the 1800s.",a:"War of 1812 / Mexican-American War / Civil War / Spanish-American War",opts:["Civil War","World War I","Vietnam War","Korean War"],cat:"Anos 1800",hint:"Guerras dos 1800s: War of 1812, Mexican-American, Civil War, Spanish-American. A Civil War é a mais importante.",explain:"Os EUA lutaram várias guerras no século XIX, sendo a Guerra Civil (1861-1865) a mais significativa.",is65:true},
  {id:72,q:"Name the U.S. war between the North and the South.",a:"The Civil War / The War between the States",opts:["The Civil War","The Revolutionary War","World War I","The War of 1812"],cat:"Anos 1800",hint:"Norte vs Sul = Civil War. Civil = entre cidadãos do mesmo país. Guerra entre americanos.",explain:"A Guerra Civil (1861-1865) foi travada entre os estados do Norte (União) e do Sul (Confederação).",is65:true},
  {id:73,q:"Name one problem that led to the Civil War.",a:"Slavery / Economic reasons / States' rights",opts:["Slavery","Immigration","Foreign invasion","Religion"],cat:"Anos 1800",hint:"Escravidão foi A causa principal. O Sul queria manter, o Norte queria abolir. Resultou em guerra.",explain:"A escravidão foi a principal causa da Guerra Civil, junto com questões econômicas e direitos dos estados.",is65:true},
  {id:74,q:"What was one important thing that Abraham Lincoln did?",a:"Freed the slaves (Emancipation Proclamation) / Saved (or preserved) the Union / Led the United States during the Civil War",opts:["Freed the slaves","Wrote the Constitution","Was the first President","Bought Louisiana"],cat:"Anos 1800",hint:"Lincoln = libertou os escravos + salvou a União. Ele manteve o país unido durante a Civil War.",explain:"Abraham Lincoln emitiu a Proclamação de Emancipação e liderou o país durante a Guerra Civil.",is65:true},
  {id:75,q:"What did the Emancipation Proclamation do?",a:"Freed the slaves / Freed slaves in the Confederacy / Freed slaves in the Confederate states / Freed slaves in most Southern states",opts:["Freed the slaves in Confederate states","Ended the Civil War","Created the Constitution","Gave women the right to vote"],cat:"Anos 1800",hint:"Emancipation = libertação. Proclamation = proclamação. Lincoln proclamou a libertação dos escravos no Sul.",explain:"A Emancipation Proclamation (1863) de Lincoln declarou livres os escravos nos estados confederados.",is65:true},
  {id:76,q:"What did Susan B. Anthony do?",a:"Fought for women's rights / Fought for civil rights",opts:["Fought for women's rights","Was the first female president","Wrote the Constitution","Freed the slaves"],cat:"Anos 1800",hint:"Susan B. Anthony = direitos das mulheres. Ela lutou para as mulheres poderem votar.",explain:"Susan B. Anthony foi uma líder do movimento sufragista, lutando pelo direito das mulheres ao voto.",is65:true},

  // C: Recent American History
  {id:77,q:"Name one war fought by the United States in the 1900s.",a:"World War I / World War II / Korean War / Vietnam War / (Persian) Gulf War",opts:["World War II","Civil War","Revolutionary War","War of 1812"],cat:"História Recente",hint:"Guerras dos 1900s: WWI, WWII, Korea, Vietnam, Gulf War. A Segunda Guerra Mundial é a mais conhecida.",explain:"Os EUA participaram de várias guerras no século XX, incluindo as duas Guerras Mundiais.",is65:true},
  {id:78,q:"Who was President during World War I?",a:"(Woodrow) Wilson",opts:["Woodrow Wilson","Franklin Roosevelt","Harry Truman","Theodore Roosevelt"],cat:"História Recente",hint:"Wilson = WWI. W de Wilson = W de World War I. As duas começam com W.",explain:"Woodrow Wilson foi presidente durante a Primeira Guerra Mundial (1914-1918).",is65:true},
  {id:79,q:"Who was President during the Great Depression and World War II?",a:"(Franklin) Roosevelt",opts:["Franklin Roosevelt","Herbert Hoover","Harry Truman","Dwight Eisenhower"],cat:"História Recente",hint:"FDR = Franklin Delano Roosevelt. Depressão + WWII. O único presidente eleito 4 vezes.",explain:"Franklin D. Roosevelt liderou os EUA durante a Grande Depressão e a Segunda Guerra Mundial.",is65:true},
  {id:80,q:"Who did the United States fight in World War II?",a:"Japan, Germany, and Italy",opts:["Japan, Germany, and Italy","England and France","Russia and China","Spain and Mexico"],cat:"História Recente",hint:"WWII: EUA lutaram contra Japão, Alemanha e Itália. Os 3 formavam o 'Eixo'. JAI = Japan, Alemanha, Italy.",explain:"Os EUA lutaram contra as potências do Eixo: Japão, Alemanha e Itália na Segunda Guerra Mundial.",is65:true},
  {id:81,q:"Before he was President, Eisenhower was a general. What war was he in?",a:"World War II",opts:["World War II","World War I","Korean War","Vietnam War"],cat:"História Recente",hint:"Eisenhower = general da WWII. Ele liderou o D-Day (invasão da Normandia). Depois virou presidente.",explain:"Dwight D. Eisenhower foi o general supremo das forças aliadas na Europa durante a WWII.",is65:true},
  {id:82,q:"During the Cold War, what was the main concern of the United States?",a:"Communism",opts:["Communism","Terrorism","Immigration","Economic collapse"],cat:"História Recente",hint:"Cold War = Guerra Fria. EUA vs URSS. O medo era o comunismo se espalhando pelo mundo.",explain:"Durante a Guerra Fria, a principal preocupação dos EUA era a expansão do comunismo soviético.",is65:true},
  {id:83,q:"What movement tried to end racial discrimination?",a:"Civil rights (movement)",opts:["Civil rights movement","Labor movement","Women's suffrage","Environmental movement"],cat:"História Recente",hint:"Civil rights movement = movimento pelos direitos civis. Martin Luther King Jr. foi o líder mais famoso.",explain:"O movimento pelos direitos civis (anos 1950-60) lutou para acabar com a discriminação racial.",is65:true},
  {id:84,q:"What did Martin Luther King, Jr. do?",a:"Fought for civil rights / Worked for equality for all Americans",opts:["Fought for civil rights","Was President","Wrote the Constitution","Led the military"],cat:"História Recente",hint:"MLK = lutou por igualdade racial de forma pacífica. 'I have a dream' = o discurso mais famoso da história.",explain:"Martin Luther King Jr. liderou o movimento pelos direitos civis de forma não violenta.",is65:true},
  {id:85,q:"What major event happened on September 11, 2001, in the United States?",a:"Terrorists attacked the United States",opts:["Terrorists attacked the United States","A hurricane hit New York","The stock market crashed","An earthquake destroyed Washington"],cat:"História Recente",hint:"9/11 = ataque terrorista. Torres Gêmeas em NY e Pentágono em DC. Data que mudou o mundo.",explain:"Em 11 de setembro de 2001, terroristas atacaram as Torres Gêmeas em Nova York e o Pentágono.",is65:true},
  {id:86,q:"Name one American Indian tribe in the United States.",a:"Cherokee / Navajo / Sioux / Chippewa / Choctaw / Pueblo / Apache / Iroquois / Creek / Blackfeet / Seminole / Cheyenne / Arawak / Shawnee / Mohegan / Huron / Oneida / Lakota / Crow / Teton / Hopi / Inuit",opts:["Cherokee","Aztec","Inca","Maya"],cat:"História Recente",hint:"Cherokee, Navajo, Sioux, Apache... são tribos dos EUA. Cherokee é a maior e mais fácil de lembrar.",explain:"Existem centenas de tribos nativas americanas reconhecidas nos EUA.",is65:false},

  // INTEGRATED CIVICS — A: Geography
  {id:87,q:"Name one of the two longest rivers in the United States.",a:"Missouri (River) / Mississippi (River)",opts:["Missouri or Mississippi","Amazon","Nile","Colorado"],cat:"Geografia",hint:"Os dois M's: Missouri e Mississippi. Ambos começam com M, ambos são enormes.",explain:"O Missouri e o Mississippi são os dois rios mais longos dos EUA.",is65:true},
  {id:88,q:"What ocean is on the West Coast of the United States?",a:"Pacific (Ocean)",opts:["Pacific Ocean","Atlantic Ocean","Indian Ocean","Arctic Ocean"],cat:"Geografia",hint:"West = Pacific. Pense: Pacific = Pacífico = paz = pôr do sol no oeste. Califórnia olha pro Pacific.",explain:"O Oceano Pacífico banha a costa oeste dos EUA (Califórnia, Oregon, Washington).",is65:true},
  {id:89,q:"What ocean is on the East Coast of the United States?",a:"Atlantic (Ocean)",opts:["Atlantic Ocean","Pacific Ocean","Indian Ocean","Arctic Ocean"],cat:"Geografia",hint:"East = Atlantic. Nova York, Miami, Boston — todos olham pro Atlantic. Leste = Atlântico.",explain:"O Oceano Atlântico banha a costa leste dos EUA (Nova York, Flórida, Massachusetts).",is65:true},
  {id:90,q:"Name one U.S. territory.",a:"Puerto Rico / U.S. Virgin Islands / American Samoa / Northern Mariana Islands / Guam",opts:["Puerto Rico","Cuba","Jamaica","Mexico"],cat:"Geografia",hint:"Puerto Rico é o território mais conhecido. Guam, Samoa, Virgin Islands, Northern Mariana Islands.",explain:"Os EUA possuem vários territórios, incluindo Puerto Rico, Guam e as Ilhas Virgens Americanas.",is65:true},
  {id:91,q:"Name one state that borders Canada.",a:"Maine / New Hampshire / Vermont / New York / Pennsylvania / Ohio / Michigan / Minnesota / North Dakota / Montana / Idaho / Washington / Alaska",opts:["New York","Florida","Texas","California"],cat:"Geografia",hint:"Estados que fazem fronteira com o Canadá ficam no NORTE. Maine, New York, Michigan, Washington, Alaska...",explain:"13 estados fazem fronteira com o Canadá, do Maine no leste ao Alaska no noroeste.",is65:true},
  {id:92,q:"Name one state that borders Mexico.",a:"California / Arizona / New Mexico / Texas",opts:["Texas","New York","Florida","Washington"],cat:"Geografia",hint:"CANT = California, Arizona, New Mexico, Texas. 4 estados no SUL fazem fronteira com o México.",explain:"Quatro estados fazem fronteira com o México: Califórnia, Arizona, Novo México e Texas.",is65:true},
  {id:93,q:"What is the capital of the United States?",a:"Washington, D.C.",opts:["Washington, D.C.","New York City","Los Angeles","Philadelphia"],cat:"Geografia",hint:"Washington D.C. = capital. NÃO é a cidade de Washington no estado de Washington. D.C. = District of Columbia.",explain:"Washington, D.C. é a capital federal dos EUA. D.C. significa District of Columbia.",is65:true},
  {id:94,q:"Where is the Statue of Liberty?",a:"New York (Harbor) / Liberty Island",opts:["New York Harbor / Liberty Island","Washington, D.C.","Los Angeles","Boston"],cat:"Geografia",hint:"Estátua da Liberdade = Nova York. Liberty Island no porto de NY. Presente da França em 1886.",explain:"A Estátua da Liberdade fica em Liberty Island, no porto de Nova York. Foi um presente da França.",is65:true},

  // B: Symbols
  {id:95,q:"Why does the flag have 13 stripes?",a:"Because there were 13 original colonies / Because the stripes represent the original colonies",opts:["13 original colonies","13 presidents","13 wars","13 amendments"],cat:"Símbolos",hint:"13 listras = 13 colônias originais. As listras nunca mudam porque as colônias são história.",explain:"As 13 listras da bandeira representam as 13 colônias originais que formaram os EUA.",is65:true},
  {id:96,q:"Why does the flag have 50 stars?",a:"Because there is one star for each state / Because each star represents a state / Because there are 50 states",opts:["One star for each state (50 states)","50 presidents","50 wars won","50 years of independence"],cat:"Símbolos",hint:"50 estrelas = 50 estados. Se um novo estado entrar, adicionam uma estrela. Simples assim.",explain:"Cada estrela na bandeira representa um dos 50 estados americanos atuais.",is65:true},
  {id:97,q:"What is the name of the national anthem?",a:"The Star-Spangled Banner",opts:["The Star-Spangled Banner","America the Beautiful","God Bless America","My Country 'Tis of Thee"],cat:"Símbolos",hint:"Star-Spangled Banner = Bandeira Estrelada. É o hino nacional. Toca antes de todo jogo de baseball!",explain:"'The Star-Spangled Banner' é o hino nacional americano, escrito por Francis Scott Key em 1814.",is65:true},

  // C: Holidays
  {id:98,q:"When do we celebrate Independence Day?",a:"July 4",opts:["July 4","June 14","September 17","November 11"],cat:"Feriados",hint:"4 de julho = Independence Day. Fogos de artifício, churrasco, bandeiras. A data mais americana que existe.",explain:"O Independence Day celebra a adoção da Declaração de Independência em 4 de julho de 1776.",is65:true},
  {id:99,q:"Name two national U.S. holidays.",a:"New Year's Day / Martin Luther King Jr. Day / Presidents' Day / Memorial Day / Independence Day / Labor Day / Columbus Day / Veterans Day / Thanksgiving / Christmas",opts:["Independence Day and Thanksgiving","Easter and Halloween","Valentine's Day and St. Patrick's","Mother's Day and Father's Day"],cat:"Feriados",hint:"Feriados nacionais: New Year's, MLK Day, Presidents' Day, Memorial Day, July 4th, Labor Day, Veterans Day, Thanksgiving, Christmas.",explain:"Os EUA têm 10 feriados federais oficiais, incluindo Independence Day, Thanksgiving e Christmas.",is65:true},

  // ADDITIONAL QUESTIONS (100-128) — 2020 civics test additions
  {id:100,q:"What is the purpose of the 10th Amendment?",a:"It states that the powers not given to the federal government belong to the states or to the people",opts:["Powers not given to federal govt belong to states/people","It abolishes slavery","It gives women the right to vote","It sets the voting age at 18"],cat:"Princípios da Democracia",hint:"10ª Emenda = o que não for do governo federal, pertence aos estados ou ao povo. Limite de poder federal.",explain:"A 10ª Emenda limita o governo federal, reservando poderes não delegados aos estados e ao povo.",is65:false},
  {id:101,q:"What is one right or freedom from the First Amendment?",a:"Speech / Religion / Assembly / Press / Petition the government",opts:["Freedom of speech","Right to bear arms","Right to vote","Right to a fair trial"],cat:"Princípios da Democracia",hint:"1ª Emenda = RAPPS: Religion, Assembly, Press, Petition, Speech. 5 liberdades fundamentais.",explain:"A Primeira Emenda protege cinco liberdades essenciais da democracia americana.",is65:false},
  {id:102,q:"How does a citizen participate in their democracy?",a:"Vote / Join a political party / Help with a campaign / Join a civic group / Run for office / Write to a newspaper / Call their elected officials",opts:["Vote and join a political party","Pay taxes","Go to work","Watch TV news"],cat:"Direitos e Responsabilidades",hint:"Participar = agir! Votar, apoiar campanha, ligar pro senador, concorrer a cargo.",explain:"Cidadãos participam da democracia de várias formas ativas.",is65:false},
  {id:103,q:"When is the last day you can send in federal income tax forms?",a:"April 15",opts:["April 15","January 15","March 15","December 31"],cat:"Direitos e Responsabilidades",hint:"15 de abril = Tax Day. Sempre. Todo ano. 15/4.",explain:"O prazo para declaração de imposto de renda federal é 15 de abril.",is65:false},
  {id:104,q:"It is important for all men age 18 through 25 to register for the Selective Service. Name one reason why.",a:"Required by law / It is a civic responsibility / It provides for the defense of the country",opts:["Required by law","To get a driver's license","To vote","To travel abroad"],cat:"Direitos e Responsabilidades",hint:"Selective Service = registro obrigatório por lei. É dever cívico e garante defesa nacional se necessário.",explain:"O registro no Selective Service é obrigatório por lei para homens de 18 a 25 anos.",is65:false},
  {id:105,q:"Name one war fought by the United States in the 1800s.",a:"War of 1812 / Mexican-American War / Civil War / Spanish-American War",opts:["Civil War","World War I","Vietnam War","Revolutionary War"],cat:"Anos 1800",hint:"1800s: War of 1812, Mexican-American, CIVIL WAR, Spanish-American. Civil War é a principal.",explain:"A Guerra Civil (1861-1865) foi a guerra mais significativa dos EUA no século XIX.",is65:false},
  {id:106,q:"Name one war fought by the United States in the 1900s.",a:"World War I / World War II / Korean War / Vietnam War / (Persian) Gulf War",opts:["World War I and World War II","Civil War","Revolutionary War","French and Indian War"],cat:"História Recente",hint:"1900s: WWI, WWII, Korea, Vietnam, Gulf War. Cinco guerras no século 20.",explain:"Os EUA lutaram em cinco grandes guerras no século XX.",is65:false},
  {id:107,q:"What group of people was taken and sold as slaves?",a:"Africans / People from Africa",opts:["Africans","Europeans","Asians","South Americans"],cat:"Período Colonial",hint:"Africanos foram trazidos à força. Escravidão africana nos EUA durou séculos.",explain:"Milhões de africanos foram escravizados e trazidos para os EUA contra sua vontade.",is65:false},
  {id:108,q:"Who lived in America before the Europeans arrived?",a:"American Indians / Native Americans",opts:["American Indians / Native Americans","No one","Africans","Vikings only"],cat:"Período Colonial",hint:"Nativos americanos / American Indians. Milhares de anos antes dos europeus.",explain:"Os povos nativos americanos habitavam o continente há milhares de anos.",is65:false},
  {id:109,q:"Why were the colonists unhappy with the British government?",a:"Taxes were too high / Taxation without representation / The British army stayed in their houses / They did not have self-government",opts:["Taxes without representation","They wanted to be French","British helped them too much","They liked the British king"],cat:"Período Colonial",hint:"'No taxation without representation!' — impostos sem representação. O grito de guerra da revolução.",explain:"Os colonos estavam insatisfeitos com impostos altos sem ter representantes no parlamento britânico.",is65:false},
  {id:110,q:"Name one important thing that Abraham Lincoln did.",a:"Freed the slaves / Saved the Union / Led during the Civil War",opts:["Freed the slaves","Wrote the Declaration","Was the first President","Discovered America"],cat:"Anos 1800",hint:"Lincoln = Emancipation Proclamation + salvou a União. O presidente da Civil War.",explain:"Abraham Lincoln libertou os escravos e manteve os Estados Unidos unidos durante a Guerra Civil.",is65:false},
  {id:111,q:"What did Susan B. Anthony do?",a:"Fought for women's rights / Fought for civil rights",opts:["Fought for women's rights","Was First Lady","Wrote the anthem","Led the military"],cat:"Anos 1800",hint:"Susan B. Anthony = sufragista. Lutou pelo voto feminino. Hoje está na moeda de $1.",explain:"Susan B. Anthony dedicou sua vida à luta pelos direitos das mulheres, especialmente o direito ao voto.",is65:false},
  {id:112,q:"Name one leader of the Civil Rights Movement.",a:"Martin Luther King Jr. / Rosa Parks / Cesar Chavez / Philip Randolph",opts:["Martin Luther King Jr.","Abraham Lincoln","George Washington","Susan B. Anthony"],cat:"História Recente",hint:"MLK é o mais famoso. Rosa Parks recusou dar o assento no ônibus. Cesar Chavez lutou por trabalhadores rurais.",explain:"Martin Luther King Jr., Rosa Parks e outros lideraram o movimento pelos direitos civis nos anos 1950-60.",is65:false},
  {id:113,q:"What did Martin Luther King Jr. do?",a:"Fought for civil rights / Worked for equality for all Americans",opts:["Fought for civil rights","Was President","Led the military","Wrote the Constitution"],cat:"História Recente",hint:"MLK lutou pela igualdade de forma pacífica. 'I have a dream' — o sonho da igualdade racial.",explain:"MLK liderou o movimento pelos direitos civis através de protestos pacíficos e não-violência.",is65:false},

// Load from localStorage
function loadState() {
  try {
    const saved = localStorage.getItem('cup_state');
    if (saved) {
      const parsed = JSON.parse(saved);
      if (parsed.user) state.user = parsed.user;
      if (parsed.selectedState) state.selectedState = parsed.selectedState;
      if (parsed.progress) state.progress = parsed.progress;
      if (state.user) state.screen = 'app';
    }
  } catch(e) {}
}

function saveState() {
  try {
    localStorage.setItem('cup_state', JSON.stringify({
      user: state.user,
      selectedState: state.selectedState,
      progress: state.progress
    }));
  } catch(e) {}
}

// ---- HELPERS ----
function getStateOptions() {
  return Object.keys(stateData).sort().map(s => `<option ${s===state.selectedState?'selected':''}>${s}</option>`).join('');
}

function getFilteredQuestions() {
  let qs = [...questions];
  if (state.studyFilter === '65') qs = qs.filter(q => q.is65);
  if (state.studyFilter === 'weak') {
    qs = qs.filter(q => {
      const p = state.progress[q.id];
      return p && p.wrong > 0 && (p.wrong / (p.correct + p.wrong)) > 0.3;
    });
  }
  if (state.studyFilter === 'cat' && state.studyCategory) {
    qs = qs.filter(q => q.cat === state.studyCategory);
  }
  return qs;
}

function getAnswer(q) {
  if (q.stateAnswer && stateData[state.selectedState]) {
    const sd = stateData[state.selectedState];
    if (q.stateAnswer === 'governor') return sd.governor;
    if (q.stateAnswer === 'senators') return sd.senators.join(' and ');
    if (q.stateAnswer === 'capital') return sd.capital;
  }
  return q.a;
}

function getOptions(q) {
  if (q.stateAnswer && stateData[state.selectedState]) {
    const sd = stateData[state.selectedState];
    const correct = getAnswer(q);
    // Generate plausible wrong answers from other states
    const otherStates = Object.keys(stateData).filter(s => s !== state.selectedState);
    const shuffled = otherStates.sort(() => Math.random() - 0.5);
    let wrongs = [];
    for (let i = 0; i < 3 && i < shuffled.length; i++) {
      const os = stateData[shuffled[i]];
      if (q.stateAnswer === 'governor') wrongs.push(os.governor);
      if (q.stateAnswer === 'senators') wrongs.push(os.senators[0]);
      if (q.stateAnswer === 'capital') wrongs.push(os.capital);
    }
    return [correct, ...wrongs].sort(() => Math.random() - 0.5);
  }
  return q.opts.length ? [...q.opts].sort(() => Math.random() - 0.5) : [q.a];
}

function getStats() {
  let studied = 0, correct = 0, wrong = 0, total = questions.length;
  Object.values(state.progress).forEach(p => {
    studied++;
    correct += p.correct;
    wrong += p.wrong;
  });
  return { studied, correct, wrong, total, pct: Math.round((studied/total)*100) };
}

function getWeakQuestions() {
  return questions.filter(q => {
    const p = state.progress[q.id];
    return p && p.wrong > 0;
  }).sort((a, b) => {
    const pa = state.progress[a.id], pb = state.progress[b.id];
    const ra = pa.wrong / (pa.correct + pa.wrong);
    const rb = pb.wrong / (pb.correct + pb.wrong);
    return rb - ra;
  }).slice(0, 8);
}

function getCategories() {
  const cats = new Set();
  questions.forEach(q => cats.add(q.cat));
  return [...cats];
}

function switchAuth(mode) {
  state.authMode = mode;
  render();
}

function handleAuth() {
  const isLogin = state.authMode === 'login';
  const email = document.getElementById('a-email').value.trim();
  const pass = document.getElementById('a-pass').value;
  const alertDiv = document.getElementById('auth-alert');

  if (!email || !pass) {
    alertDiv.innerHTML = '<div class="auth-alert err">Preencha todos os campos.</div>';
    return;
  }
  if (pass.length < 6) {
    alertDiv.innerHTML = '<div class="auth-alert err">A senha deve ter pelo menos 6 caracteres.</div>';
    return;
  }

  if (isLogin) {
    // Check localStorage for saved user
    const saved = localStorage.getItem('cup_user_' + email);
    if (!saved) {
      alertDiv.innerHTML = '<div class="auth-alert err">E-mail não encontrado. Crie uma conta primeiro.</div>';
      return;
    }
    const userData = JSON.parse(saved);
    if (userData.pass !== pass) {
      alertDiv.innerHTML = '<div class="auth-alert err">Senha incorreta. Tente novamente.</div>';
      return;
    }
    state.user = { name: userData.name, email: email };
    state.selectedState = userData.state || 'Florida';
    // Load progress for this user
    const prog = localStorage.getItem('cup_progress_' + email);
    if (prog) state.progress = JSON.parse(prog);
    state.screen = 'app';
    saveState();
    render();
  } else {
    const name = document.getElementById('a-name').value.trim();
    const st = document.getElementById('a-state').value;
    if (!name) {
      alertDiv.innerHTML = '<div class="auth-alert err">Informe seu nome.</div>';
      return;
    }
    // Save user
    localStorage.setItem('cup_user_' + email, JSON.stringify({ name, pass, state: st }));
    state.user = { name, email };
    state.selectedState = st;
    state.progress = {};
    state.screen = 'app';
    saveState();
    render();
  }
}

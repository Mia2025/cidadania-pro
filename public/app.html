function renderQuizQuestion() {
  const q = state.quizQuestions[state.quizIndex];
  const opts = getOptions(q);
  const answered = state.quizAnswers[state.quizIndex];
  const correctAnswer = getAnswer(q);

  return `
    <div class="prog-wrap">
      <div class="prog-head">
        <span>Pergunta ${state.quizIndex + 1} de ${state.quizQuestions.length}</span>
        <strong>${Math.round(((state.quizIndex + 1)/state.quizQuestions.length)*100)}%</strong>
      </div>
      <div class="prog-bar">
        <div class="prog-fill" style="width:${((state.quizIndex + 1)/state.quizQuestions.length)*100}%"></div>
      </div>
    </div>

    <div class="quiz-card">
      <div class="q-badge">Pergunta ${state.quizIndex + 1} de ${state.quizQuestions.length} ${q.is65 ? '<span class="star65">★ 65/20</span>' : ''}</div>
      <div class="q-text">${q.q}</div>
      <div class="q-cat">${q.cat}</div>

      <div class="quiz-options">
        ${opts.map((opt, i) => {
          let cls = 'qo-btn';
          if (answered) {
            cls += ' answered';
            const isCorrect = opt === correctAnswer || correctAnswer.includes(opt);
            if (answered.selected === opt) {
              cls += answered.isCorrect ? ' correct' : ' wrong';
            }
            if (isCorrect && !answered.isCorrect) {
              cls += ' show-correct';
            }
          }
          return `<button class="${cls}" onclick="answerQuiz(${state.quizIndex},'${opt.replace(/'/g, "\\'")}',${i})">${opt}</button>`;
        }).join('')}
      </div>

      ${answered ? `
        <div class="quiz-feedback ${answered.isCorrect ? 'correct' : 'wrong'}">
          ${answered.isCorrect
            ? '✅ Correto! ' + q.hint
            : '❌ Incorreto. A resposta certa é: <strong>' + correctAnswer + '</strong><br>💡 ' + q.hint}
        </div>
        <div class="study-nav" style="margin-top:16px">
          ${state.quizIndex < state.quizQuestions.length - 1
            ? `<div></div><button class="study-btn btn-next" onclick="nextQuizQ()">Próxima →</button>`
            : `<div></div><button class="study-btn btn-next" onclick="finishQuiz()">Ver resultado 🏁</button>`}
        </div>
      ` : ''}
    </div>
  `;
}

function answerQuiz(index, selected, optIdx) {
  if (state.quizAnswers[index]) return;
  const q = state.quizQuestions[index];
  const correctAnswer = getAnswer(q);
  const isCorrect = selected === correctAnswer || correctAnswer.includes(selected);

  state.quizAnswers[index] = { selected, isCorrect };

  // Update progress
  if (!state.progress[q.id]) state.progress[q.id] = { correct: 0, wrong: 0 };
  if (isCorrect) state.progress[q.id].correct++;
  else state.progress[q.id].wrong++;
  state.progress[q.id].lastAnswer = isCorrect ? 'correct' : 'wrong';

  if (state.user) {
    localStorage.setItem('cup_progress_' + state.user.email, JSON.stringify(state.progress));
  }
  saveState();
  render();
}

function nextQuizQ() {
  state.quizIndex++;
  render();
  window.scrollTo(0, 0);
}

function finishQuiz() {
  state.quizDone = true;
  render();
  window.scrollTo(0, 0);
}

function renderQuizResult() {
  const total = state.quizQuestions.length;
  const correct = state.quizAnswers.filter(a => a && a.isCorrect).length;
  const wrong = total - correct;
  const pct = Math.round((correct / total) * 100);
  const passed = correct >= Math.ceil(total * 0.6); // 60% = pass (12/20)

  const wrongQs = state.quizQuestions.filter((q, i) => state.quizAnswers[i] && !state.quizAnswers[i].isCorrect);

  return `
    <div class="quiz-result">
      <div class="result-circle ${passed ? 'pass' : 'fail'}">
        ${pct}%<sub>${correct}/${total}</sub>
      </div>
      <h2 class="${passed ? 'pass' : 'fail'}">${passed ? '🎉 Aprovado!' : '📚 Continue estudando'}</h2>
      <p>${passed
        ? 'Excelente! Você acertou ' + correct + ' de ' + total + '. Na entrevista real, precisa acertar 12 de 20.'
        : 'Você acertou ' + correct + ' de ' + total + '. Precisa de pelo menos ' + Math.ceil(total * 0.6) + '. Revise os pontos fracos e tente de novo!'}</p>

      <div class="result-details">
        <div class="rd"><strong style="color:var(--green)">${correct}</strong><span>Corretas</span></div>
        <div class="rd"><strong style="color:var(--red)">${wrong}</strong><span>Erradas</span></div>
        <div class="rd"><strong style="color:var(--navy)">${pct}%</strong><span>Aproveit.</span></div>
      </div>

      ${wrongQs.length > 0 ? `
        <div class="result-wrongs">
          <h4>❌ Perguntas que você errou</h4>
          ${wrongQs.map(q => `
            <div class="rw-item">
              #${q.id} — ${q.q}
              <strong>✅ ${getAnswer(q)}</strong>
            </div>
          `).join('')}
        </div>
      ` : ''}

      <div class="result-btns">
        <button class="study-btn btn-prev" onclick="state.quizMode=false;state.quizDone=false;render()">← Voltar</button>
        <button class="study-btn btn-next" onclick="startQuiz()">🔄 Novo simulado</button>
      </div>
    </div>
  `;
}

// ---- COMMANDS & INTERVIEW TIPS ----
function renderCommands() {
  return `
    <div class="section-title">No dia da entrevista</div>
    <div class="section-h">Os 10 comandos do oficial</div>
    <p style="font-size:14px;color:var(--muted);margin-bottom:20px;line-height:1.7">A entrevista começa com comandos em inglês. Você precisa entender e reagir — isso também é observado.</p>

    ${commands.map((c, i) => `
      <div class="cmd-card">
        <div class="cmd-n">${i + 1}</div>
        <div>
          <div class="cmd-en">${c.en}</div>
          <div class="cmd-pt">${c.pt}</div>
        </div>
      </div>
    `).join('')}

    <div class="rule-card">
      <h3>⭐ Regra 65/20</h3>
      <p>Se você tem 65 anos ou mais E é residente permanente há 20+ anos, você só precisa estudar as perguntas marcadas com ★ — e pode responder em <strong>português</strong>.</p>
      <button class="study-btn btn-next" style="margin-top:14px" onclick="state.studyFilter='65';switchTab('study')">Ver perguntas 65/20 →</button>
    </div>

    <div class="section-h" style="margin-top:32px">Dicas para o dia</div>
    <div class="tips-grid">
      <div class="tip-card">
        <h4>👔 Como chegar</h4>
        <p>Roupa social limpa. Documentos organizados em pasta. Chegue 20 minutos antes.</p>
      </div>
      <div class="tip-card">
        <h4>📄 O que levar</h4>
        <p>Green card, passaporte, foto 2×2 e convocação impressa. Tudo na mão, sem improvisar.</p>
      </div>
      <div class="tip-card">
        <h4>🗣️ Como responder</h4>
        <p>Direto, sem enrolação. Se não entendeu: "Could you please repeat?" É permitido.</p>
      </div>
      <div class="tip-card">
        <h4>📊 A matemática</h4>
        <p>Você precisa acertar 12 de 20 perguntas. O oficial escolhe as 20 das 128 possíveis.</p>
      </div>
    </div>
  `;
}

// ---- INIT ----
loadState();
render();
</script>
</body>
</html>
